services:
    db:
        image: postgres:15
        environment:
            POSTGRES_USER: myuser
            POSTGRES_PASSWORD: mypassword
            POSTGRES_DB: crud_db
        ports:
            - "5433:5432"
        volumes:
            - ./init.sql:/docker-entrypoint-initdb.d/init.sql
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U myuser -d crud_db"]
            interval: 5s
            timeout: 5s
            retries: 10
            start_period: 10s

    pgadmin:
        image: dpage/pgadmin4
        environment:
            PGADMIN_DEFAULT_EMAIL: admin@admin.com
            PGADMIN_DEFAULT_PASSWORD: admin
        ports:
            - "5050:80"
        depends_on:
            - db

    backend:
        build: ./backend
        ports:
            - "5000:5000"
        environment:
            DATABASE_URL: postgres://myuser:mypassword@db:5432/crud_db?sslmode=disable
            JWT_SECRET: your-secret-key-change-in-production
            PORT: 5000
        depends_on:
            db:
                condition: service_healthy




volumes:
    postgres_data:
