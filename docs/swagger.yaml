        type: integer
      notes:
        type: string
      order_id:
        type: integer
      product_id:
        type: integer
      product_name:
        type: string
      quantity:
        type: number
      unit:
        type: string
      unit_price:
        type: number
    type: object
  models.Product:
    properties:
      created_at:
        type: string
      description:
        type: string
      id:
        type: integer
      name:
        type: string
      unit:
        type: string
      unit_price:
        type: number
    type: object
  models.ProductCreate:
    properties:
