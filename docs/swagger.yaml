    - unit
    - unit_price
    type: object
  models.ProductQty:
    properties:
      product_id:
        type: integer
      product_name:
        type: string
      total_qty:
        type: number
    type: object
  models.ProductSearchResult:
    properties:
      id:
        type: integer
      name:
        type: string
    type: object
  models.Proposal:
    properties:
      client_id:
        type: integer
      client_name:
        type: string
      created_at:
        type: string
      id:
        type: integer
      items:
        items:
          $ref: '#/definitions/models.ProposalItem'
        type: array
      notes:
        type: string
      reference:
        type: string
      section_id:
        $ref: '#/definitions/models.NullInt64'
      section_name:
        $ref: '#/definitions/models.NullString'
      status:
        type: string
      updated_at:
        type: string
    type: object
  models.ProposalItem:
    properties:
      id:
        type: integer
      notes:
        type: string
      product_id:
        type: integer
      product_name:
        type: string
      proposal_id:
        type: integer
      quantity:
        type: number
      unit:
        type: string
      unit_price:
        type: number
    type: object
  models.ProposalItemCreate:
    properties:
      notes:
        type: string
      product_id:
        type: integer
      quantity:
        type: number
      unit_price:
        type: number
    required:
    - product_id
    - quantity
    - unit_price
    type: object
  models.ProposalItemUpdate:
    properties:
      notes:
        type: string
      product_id:
        type: integer
      quantity:
        type: number
      unit_price:
        type: number
    required:
    - product_id
    - quantity
    - unit_price
    type: object
  models.Section:
    properties:
      created_at:
        type: string
      description:
        type: string
      id:
        type: integer
      name:
        type: string
    type: object
  models.SectionCreate:
    properties:
      description:
        type: string
      name:
        type: string
    required:
    - name
    type: object
  models.SectionSearchResult:
    properties:
      id:
        type: integer
      name:
        type: string
    type: object
  models.SectionUpdate:
    properties:
      description:
        type: string
      name:
        type: string
    required:
    - name
    type: object
  models.StatisticsResponse:
    properties:
      active_orders:
        description: Active/completed
        type: integer
      avg_order_value:
        type: number
      clients_per_month:
        items:
          $ref: '#/definitions/models.MonthCount'
        type: array
      completed_orders:
        description: completed + delivered
        type: integer
      conversion_rate:
        description: Conversion (approved proposals / total proposals * 100)
        type: number
      orders_by_section:
        description: Section breakdowns
        items:
          $ref: '#/definitions/models.LabelCount'
        type: array
      orders_by_status:
        description: Status breakdowns
        items:
          $ref: '#/definitions/models.StatusCount'
        type: array
      orders_per_month:
        description: Time series — last 6 calendar months
        items:
          $ref: '#/definitions/models.MonthCount'
        type: array
      proposals_by_section:
        items:
          $ref: '#/definitions/models.LabelCount'
        type: array
      proposals_by_status:
        items:
          $ref: '#/definitions/models.StatusCount'
        type: array
      proposals_per_month:
        items:
          $ref: '#/definitions/models.MonthCount'
        type: array
      top_clients_by_revenue:
        description: Top-N lists
        items:
          $ref: '#/definitions/models.ClientRevenue'
        type: array
      top_products_by_qty:
        items:
          $ref: '#/definitions/models.ProductQty'
        type: array
      total_clients:
        type: integer
      total_order_revenue:
        description: Revenue
        type: number
      total_orders:
        description: Counts
        type: integer
      total_products:
        type: integer
      total_proposal_value:
        type: number
      total_proposals:
        type: integer
      total_sections:
        type: integer
    type: object
  models.StatusCount:
    properties:
      count:
        type: integer
      status:
        type: string
    type: object
  models.User:
    properties:
      created_at:
