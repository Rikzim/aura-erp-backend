          schema:
            additionalProperties:
              type: string
            type: object
      summary: Search products
      tags:
      - products
  /proposal-items:
    get:
      consumes:
      - application/json
      description: Get all items associated with a specific proposal
      parameters:
      - description: Proposal ID
        in: query
        name: proposal_id
        required: true
