basePath: /api
definitions:
  controllers.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  models.AuditLog:
    properties:
      action:
        type: string
      created_at:
        type: string
      entity_id:
        type: integer
      entity_type:
        type: string
      id:
        type: integer
      new_value:
        items:
          type: integer
        type: array
      old_value:
        items:
          type: integer
        type: array
      user_id:
        $ref: '#/definitions/models.NullInt64'
      user_name:
        type: string
    type: object
  models.AuditLogCreate:
    properties:
      action:
        type: string
      entity_id:
        type: integer
      entity_type:
        type: string
      new_value:
        items:
          type: integer
        type: array
      old_value:
        items:
          type: integer
        type: array
      user_id:
        $ref: '#/definitions/sql.NullInt64'
    required:
    - action
    - entity_id
    - entity_type
    type: object
  models.Client:
    properties:
      address:
        type: string
      created_at:
        type: string
      email:
        type: string
      id:
        type: integer
      name:
        type: string
      notes:
        type: string
      phone:
        type: string
      updated_at:
        type: string
      vat_number:
        type: string
    type: object
  models.ClientCreate:
    properties:
      address:
        type: string
      email:
        type: string
      name:
        type: string
      notes:
        type: string
      phone:
        type: string
      vat_number:
        type: string
    required:
    - name
    type: object
  models.ClientRevenue:
    properties:
      client_id:
        type: integer
      client_name:
        type: string
      revenue:
        type: number
    type: object
  models.ClientSearchResult:
    properties:
      id:
        type: integer
      name:
        type: string
    type: object
  models.ClientUpdate:
    properties:
      address:
        type: string
      email:
        type: string
      name:
        type: string
      notes:
        type: string
      phone:
        type: string
      vat_number:
        type: string
    required:
    - name
    type: object
  models.LabelCount:
    properties:
      count:
        type: integer
      label:
        type: string
    type: object
  models.MonthCount:
    properties:
      count:
        type: integer
      month:
        description: 1–12
        type: integer
      year:
        type: integer
    type: object
  models.NullInt64:
    properties:
      int64:
        format: int64
        type: integer
      valid:
        description: Valid is true if Int64 is not NULL
        type: boolean
    type: object
  models.NullString:
    properties:
      string:
        type: string
      valid:
        description: Valid is true if String is not NULL
        type: boolean
    type: object
  models.NullTime:
    properties:
      time:
        type: string
      valid:
        description: Valid is true if Time is not NULL
        type: boolean
    type: object
  models.Order:
    properties:
      client_id:
        type: integer
      client_name:
        type: string
      created_at:
        type: string
      due_date:
        $ref: '#/definitions/models.NullTime'
      id:
        type: integer
      items:
        items:
          $ref: '#/definitions/models.OrderItem'
        type: array
      proposal_id:
        $ref: '#/definitions/models.NullInt64'
      proposal_reference:
        $ref: '#/definitions/models.NullString'
      reference:
        type: string
      section_id:
        $ref: '#/definitions/models.NullInt64'
      section_name:
        $ref: '#/definitions/models.NullString'
      status:
        type: string
      updated_at:
        type: string
    type: object
  models.OrderCreate:
    properties:
      client_id:
        type: integer
      due_date:
        $ref: '#/definitions/models.NullTime'
      proposal_id:
        $ref: '#/definitions/models.NullInt64'
      reference:
        type: string
      section_id:
        $ref: '#/definitions/models.NullInt64'
      status:
